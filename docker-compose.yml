services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - staticfiles:/app/staticfiles
    env_file:
      - .env
    restart: unless-stopped

  reminder:
    build: .
    command: python reminder_scheduler.py
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
    restart: unless-stopped

volumes:
  staticfiles: